name: TASK003 - Admin CRUD for publications and categories

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  task003:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.5

      - name: Write project files
        shell: bash
        run: |
          mkdir -p components
          mkdir -p pages/admin/publications/[id]
          mkdir -p pages/admin/categories

          cat > components/PublicationForm.vue <<'EOF'
          <template>
            <form class="space-y-5" @submit.prevent="handleSubmit">
              <div class="grid gap-5 md:grid-cols-2">
                <div>
                  <label class="label" for="title">Назва публікації</label>
                  <input id="title" v-model="form.title" type="text" class="input" required>
                </div>

                <div>
                  <label class="label" for="author">Автор</label>
                  <input id="author" v-model="form.author" type="text" class="input" required>
                </div>
              </div>

              <div>
                <label class="label" for="description">Короткий опис</label>
                <textarea
                  id="description"
                  v-model="form.description"
                  class="input min-h-[110px]"
                  required
                />
              </div>

              <div>
                <label class="label" for="content">Текст публікації</label>
                <textarea
                  id="content"
                  v-model="form.content"
                  class="input min-h-[260px]"
                  required
                />
              </div>

              <div class="grid gap-5 md:grid-cols-2">
                <div>
                  <label class="label" for="categoryId">Категорія</label>
                  <select id="categoryId" v-model="form.categoryId" class="input" required>
                    <option value="" disabled>Оберіть категорію</option>
                    <option v-for="item in categories" :key="item.id" :value="item.id">
                      {{ item.name }}
                    </option>
                  </select>
                </div>

                <div>
                  <label class="label" for="coverImage">Обкладинка (URL)</label>
                  <input id="coverImage" v-model="form.coverImage" type="text" class="input" placeholder="https://...">
                </div>
              </div>

              <div v-if="form.coverImage" class="overflow-hidden rounded-2xl border border-slate-200 bg-slate-50">
                <img
                  :src="form.coverImage"
                  alt="Попередній перегляд обкладинки"
                  class="h-56 w-full object-cover"
                >
              </div>

              <p v-if="errorMessage" class="text-sm text-red-600">
                {{ errorMessage }}
              </p>

              <div class="flex flex-wrap gap-3">
                <button type="submit" class="btn-primary" :disabled="loading">
                  {{ loading ? submitLoadingText : submitText }}
                </button>

                <button type="button" class="btn-secondary" @click="$emit('cancel')">
                  Скасувати
                </button>
              </div>
            </form>
          </template>

          <script setup lang="ts">
          import type { CategoryItem } from '~/composables/useCategories'
          import type { PublicationItem } from '~/composables/usePublications'

          const props = withDefaults(defineProps<{
            categories: CategoryItem[]
            initialData?: Partial<PublicationItem> | null
            submitText?: string
            submitLoadingText?: string
          }>(), {
            initialData: null,
            submitText: 'Зберегти',
            submitLoadingText: 'Збереження...'
          })

          const emit = defineEmits<{
            submit: [payload: Omit<PublicationItem, 'id'>]
            cancel: []
          }>()

          const form = reactive<Omit<PublicationItem, 'id'>>({
            title: props.initialData?.title || '',
            author: props.initialData?.author || '',
            description: props.initialData?.description || '',
            content: props.initialData?.content || '',
            categoryId: props.initialData?.categoryId || '',
            coverImage: props.initialData?.coverImage || '',
            createdAt: props.initialData?.createdAt || null
          })

          const loading = ref(false)
          const errorMessage = ref('')

          watch(
            () => props.initialData,
            (value) => {
              form.title = value?.title || ''
              form.author = value?.author || ''
              form.description = value?.description || ''
              form.content = value?.content || ''
              form.categoryId = value?.categoryId || ''
              form.coverImage = value?.coverImage || ''
              form.createdAt = value?.createdAt || null
            },
            { deep: true }
          )

          const handleSubmit = async () => {
            errorMessage.value = ''

            if (!form.title.trim()) {
              errorMessage.value = 'Вкажіть назву публікації.'
              return
            }

            if (!form.author.trim()) {
              errorMessage.value = 'Вкажіть автора.'
              return
            }

            if (!form.description.trim()) {
              errorMessage.value = 'Вкажіть короткий опис.'
              return
            }

            if (!form.content.trim()) {
              errorMessage.value = 'Вкажіть текст публікації.'
              return
            }

            if (!form.categoryId) {
              errorMessage.value = 'Оберіть категорію.'
              return
            }

            loading.value = true

            try {
              emit('submit', {
                title: form.title.trim(),
                author: form.author.trim(),
                description: form.description.trim(),
                content: form.content.trim(),
                categoryId: form.categoryId,
                coverImage: form.coverImage.trim(),
                createdAt: form.createdAt || null
              })
            } finally {
              setTimeout(() => {
                loading.value = false
              }, 300)
            }
          }
          </script>
          EOF

          cat > pages/admin/publications/index.vue <<'EOF'
          <template>
            <section>
              <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                <div>
                  <h1 class="page-title">Керування публікаціями</h1>
                  <p class="page-subtitle">Створення, редагування та видалення електронних публікацій.</p>
                </div>

                <NuxtLink to="/admin/publications/create" class="btn-primary">
                  Додати публікацію
                </NuxtLink>
              </div>

              <div class="mt-6 card p-4">
                <label class="label" for="search">Пошук у списку</label>
                <input
                  id="search"
                  v-model="search"
                  type="text"
                  class="input"
                  placeholder="Введіть назву або автора"
                >
              </div>

              <div v-if="filteredPublications.length" class="mt-6 overflow-hidden rounded-2xl border border-slate-200 bg-white">
                <table class="min-w-full text-sm">
                  <thead class="bg-slate-50">
                    <tr>
                      <th class="px-4 py-3 text-left font-semibold text-slate-700">Назва</th>
                      <th class="px-4 py-3 text-left font-semibold text-slate-700">Автор</th>
                      <th class="px-4 py-3 text-left font-semibold text-slate-700">Категорія</th>
                      <th class="px-4 py-3 text-left font-semibold text-slate-700">Дії</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr
                      v-for="item in filteredPublications"
                      :key="item.id"
                      class="border-t border-slate-200 align-top"
                    >
                      <td class="px-4 py-3 text-slate-900">{{ item.title }}</td>
                      <td class="px-4 py-3 text-slate-600">{{ item.author }}</td>
                      <td class="px-4 py-3 text-slate-600">{{ getCategoryName(item.categoryId) }}</td>
                      <td class="px-4 py-3">
                        <div class="flex flex-wrap gap-2">
                          <NuxtLink :to="`/admin/publications/${item.id}/edit`" class="btn-secondary">
                            Редагувати
                          </NuxtLink>

                          <button class="btn-secondary text-red-600" @click="handleDelete(item.id)">
                            Видалити
                          </button>
                        </div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <div v-else class="mt-6 card p-8 text-center text-slate-500">
                Публікації не знайдено.
              </div>
            </section>
          </template>

          <script setup lang="ts">
          definePageMeta({
            layout: 'admin',
            middleware: 'admin'
          })

          const { loadPublications, publications, removePublication } = usePublications()
          const { categories, loadCategories } = useCategories()

          const search = ref('')

          await loadCategories()
          await loadPublications()

          const getCategoryName = (categoryId: string) => {
            return categories.value.find(item => item.id === categoryId)?.name || '—'
          }

          const filteredPublications = computed(() => {
            const query = search.value.trim().toLowerCase()

            if (!query) return publications.value

            return publications.value.filter(item =>
              item.title.toLowerCase().includes(query) ||
              item.author.toLowerCase().includes(query)
            )
          })

          const handleDelete = async (id: string) => {
            if (!confirm('Видалити цю публікацію?')) return

            try {
              await removePublication(id)
            } catch (error) {
              console.error(error)
              alert('Не вдалося видалити публікацію.')
            }
          }
          </script>
          EOF

          cat > pages/admin/publications/create.vue <<'EOF'
          <template>
            <section>
              <div class="mb-6">
                <h1 class="page-title">Додавання публікації</h1>
                <p class="page-subtitle">Створення нового запису в каталозі інтернет-видавництва.</p>
              </div>

              <div class="card p-6">
                <PublicationForm
                  :categories="categories"
                  submit-text="Створити публікацію"
                  submit-loading-text="Створення..."
                  @submit="handleCreate"
                  @cancel="handleCancel"
                />
              </div>
            </section>
          </template>

          <script setup lang="ts">
          import type { PublicationItem } from '~/composables/usePublications'

          definePageMeta({
            layout: 'admin',
            middleware: 'admin'
          })

          const { categories, loadCategories } = useCategories()
          const { createPublication } = usePublications()

          await loadCategories()

          const handleCreate = async (payload: Omit<PublicationItem, 'id'>) => {
            try {
              await createPublication(payload)
              await navigateTo('/admin/publications')
            } catch (error) {
              console.error(error)
              alert('Не вдалося створити публікацію.')
            }
          }

          const handleCancel = async () => {
            await navigateTo('/admin/publications')
          }
          </script>
          EOF

          cat > pages/admin/publications/[id]/edit.vue <<'EOF'
          <template>
            <section>
              <div class="mb-6">
                <h1 class="page-title">Редагування публікації</h1>
                <p class="page-subtitle">Оновлення даних електронної публікації.</p>
              </div>

              <div v-if="publication" class="card p-6">
                <PublicationForm
                  :categories="categories"
                  :initial-data="publication"
                  submit-text="Зберегти зміни"
                  submit-loading-text="Збереження..."
                  @submit="handleUpdate"
                  @cancel="handleCancel"
                />
              </div>

              <div v-else class="card p-8 text-center text-slate-500">
                Публікацію не знайдено.
              </div>
            </section>
          </template>

          <script setup lang="ts">
          import type { PublicationItem } from '~/composables/usePublications'

          definePageMeta({
            layout: 'admin',
            middleware: 'admin'
          })

          const route = useRoute()
          const { categories, loadCategories } = useCategories()
          const { currentPublication, loadPublications, loadPublicationById, updatePublication } = usePublications()

          await loadCategories()
          await loadPublications()
          await loadPublicationById(String(route.params.id))

          const publication = computed(() => currentPublication.value)

          const handleUpdate = async (payload: Omit<PublicationItem, 'id'>) => {
            try {
              await updatePublication(String(route.params.id), payload)
              await navigateTo('/admin/publications')
            } catch (error) {
              console.error(error)
              alert('Не вдалося оновити публікацію.')
            }
          }

          const handleCancel = async () => {
            await navigateTo('/admin/publications')
          }
          </script>
          EOF

          cat > pages/admin/categories/index.vue <<'EOF'
          <template>
            <section class="space-y-6">
              <div>
                <h1 class="page-title">Керування категоріями</h1>
                <p class="page-subtitle">Створення, редагування та видалення тематичних категорій.</p>
              </div>

              <div class="card p-6">
                <h2 class="text-xl font-semibold text-slate-900">
                  {{ editingId ? 'Редагування категорії' : 'Додавання категорії' }}
                </h2>

                <form class="mt-5 space-y-4" @submit.prevent="handleSubmit">
                  <div>
                    <label class="label" for="name">Назва категорії</label>
                    <input id="name" v-model="form.name" type="text" class="input" required>
                  </div>

                  <div>
                    <label class="label" for="description">Опис категорії</label>
                    <textarea
                      id="description"
                      v-model="form.description"
                      class="input min-h-[110px]"
                      required
                    />
                  </div>

                  <div class="flex flex-wrap gap-3">
                    <button type="submit" class="btn-primary">
                      {{ editingId ? 'Зберегти зміни' : 'Додати категорію' }}
                    </button>

                    <button
                      v-if="editingId"
                      type="button"
                      class="btn-secondary"
                      @click="resetForm"
                    >
                      Скасувати редагування
                    </button>
                  </div>
                </form>
              </div>

              <div v-if="categories.length" class="grid gap-4">
                <div
                  v-for="item in categories"
                  :key="item.id"
                  class="card p-5"
                >
                  <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
                    <div>
                      <h2 class="text-lg font-semibold text-slate-900">{{ item.name }}</h2>
                      <p class="mt-2 text-sm text-slate-600">{{ item.description }}</p>
                    </div>

                    <div class="flex flex-wrap gap-2">
                      <button class="btn-secondary" @click="startEdit(item.id)">
                        Редагувати
                      </button>

                      <button class="btn-secondary text-red-600" @click="handleDelete(item.id)">
                        Видалити
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <div v-else class="card p-8 text-center text-slate-500">
                Категорії ще не створено.
              </div>
            </section>
          </template>

          <script setup lang="ts">
          definePageMeta({
            layout: 'admin',
            middleware: 'admin'
          })

          const { categories, loadCategories, createCategory, updateCategory, removeCategory } = useCategories()

          const editingId = ref<string | null>(null)

          const form = reactive({
            name: '',
            description: ''
          })

          await loadCategories()

          const resetForm = () => {
            editingId.value = null
            form.name = ''
            form.description = ''
          }

          const startEdit = (id: string) => {
            const category = categories.value.find(item => item.id === id)
            if (!category) return

            editingId.value = id
            form.name = category.name
            form.description = category.description
          }

          const handleSubmit = async () => {
            try {
              if (editingId.value) {
                await updateCategory(editingId.value, {
                  name: form.name.trim(),
                  description: form.description.trim()
                })
              } else {
                await createCategory({
                  name: form.name.trim(),
                  description: form.description.trim()
                })
              }

              resetForm()
            } catch (error) {
              console.error(error)
              alert('Не вдалося зберегти категорію.')
            }
          }

          const handleDelete = async (id: string) => {
            if (!confirm('Видалити цю категорію?')) return

            try {
              await removeCategory(id)

              if (editingId.value === id) {
                resetForm()
              }
            } catch (error) {
              console.error(error)
              alert('Не вдалося видалити категорію.')
            }
          }
          </script>
          EOF

          cat > composables/usePublications.ts <<'EOF'
          import {
            addDoc,
            collection,
            deleteDoc,
            doc,
            getDoc,
            getDocs,
            orderBy,
            query,
            serverTimestamp,
            updateDoc
          } from 'firebase/firestore'

          export interface PublicationItem {
            id: string
            title: string
            author: string
            description: string
            content: string
            categoryId: string
            coverImage: string
            createdAt?: unknown
          }

          const demoPublications: PublicationItem[] = [
            {
              id: 'demo-1',
              title: 'Основи веб-розробки',
              author: 'Олена Коваль',
              description: 'Короткий вступ до сучасної веб-розробки та основ побудови інтерфейсів.',
              content: 'Це демонстраційний текст публікації. Надалі тут буде повний вміст книги або статті.',
              categoryId: '1',
              coverImage: ''
            },
            {
              id: 'demo-2',
              title: 'Tailwind CSS для початківців',
              author: 'Ірина Петренко',
              description: 'Практичний матеріал для створення адаптивних інтерфейсів за допомогою utility-first підходу.',
              content: 'Це демонстраційний текст другої публікації. Його можна буде замінити реальним контентом.',
              categoryId: '2',
              coverImage: ''
            }
          ]

          const publicationsState = () => useState<PublicationItem[]>('publications', () => [])
          const currentPublicationState = () => useState<PublicationItem | null>('currentPublication', () => null)

          export const usePublications = () => {
            const { $db } = useNuxtApp()
            const publications = publicationsState()
            const currentPublication = currentPublicationState()

            const loadPublications = async () => {
              try {
                const q = query(collection($db, 'publications'), orderBy('title'))
                const snapshot = await getDocs(q)

                publications.value = snapshot.docs.map(docItem => ({
                  id: docItem.id,
                  title: String(docItem.data().title || ''),
                  author: String(docItem.data().author || ''),
                  description: String(docItem.data().description || ''),
                  content: String(docItem.data().content || ''),
                  categoryId: String(docItem.data().categoryId || ''),
                  coverImage: String(docItem.data().coverImage || ''),
                  createdAt: docItem.data().createdAt
                }))

                if (!publications.value.length) {
                  publications.value = demoPublications
                }
              } catch {
                publications.value = demoPublications
              }
            }

            const loadPublicationById = async (id: string) => {
              try {
                const snapshot = await getDoc(doc($db, 'publications', id))

                if (snapshot.exists()) {
                  currentPublication.value = {
                    id: snapshot.id,
                    title: String(snapshot.data().title || ''),
                    author: String(snapshot.data().author || ''),
                    description: String(snapshot.data().description || ''),
                    content: String(snapshot.data().content || ''),
                    categoryId: String(snapshot.data().categoryId || ''),
                    coverImage: String(snapshot.data().coverImage || ''),
                    createdAt: snapshot.data().createdAt
                  }
                  return
                }

                currentPublication.value = publications.value.find(item => item.id === id) || null
              } catch {
                currentPublication.value = publications.value.find(item => item.id === id) || null
              }
            }

            const createPublication = async (payload: Omit<PublicationItem, 'id'>) => {
              await addDoc(collection($db, 'publications'), {
                title: payload.title,
                author: payload.author,
                description: payload.description,
                content: payload.content,
                categoryId: payload.categoryId,
                coverImage: payload.coverImage,
                createdAt: serverTimestamp()
              })

              await loadPublications()
            }

            const updatePublication = async (id: string, payload: Omit<PublicationItem, 'id'>) => {
              await updateDoc(doc($db, 'publications', id), {
                title: payload.title,
                author: payload.author,
                description: payload.description,
                content: payload.content,
                categoryId: payload.categoryId,
                coverImage: payload.coverImage
              })

              await loadPublications()
            }

            const removePublication = async (id: string) => {
              await deleteDoc(doc($db, 'publications', id))
              await loadPublications()
            }

            return {
              publications,
              currentPublication,
              loadPublications,
              loadPublicationById,
              createPublication,
              updatePublication,
              removePublication
            }
          }
          EOF

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build project
        run: yarn build

      - name: Commit and push changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git diff --cached --quiet || git commit -m "TASK003: implement admin CRUD forms for publications and categories"
          git push
