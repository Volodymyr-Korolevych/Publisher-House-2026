          }

          .card {
            @apply rounded-2xl bg-white shadow-sm ring-1 ring-slate-200;
          }

          .btn {
            @apply inline-flex items-center justify-center rounded-xl px-4 py-2 text-sm font-medium transition;
          }

          .btn-primary {
            @apply btn bg-slate-900 text-white hover:bg-slate-800;
          }

          .btn-secondary {
            @apply btn bg-white text-slate-900 ring-1 ring-slate-300 hover:bg-slate-100;
          }

          .input {
            @apply w-full rounded-xl border border-slate-300 bg-white px-4 py-2 outline-none transition focus:border-slate-500;
          }

          .label {
            @apply mb-1 block text-sm font-medium text-slate-700;
          }

          .page-title {
            @apply text-3xl font-bold tracking-tight text-slate-900;
          }

          .page-subtitle {
            @apply mt-2 text-sm text-slate-600;
          }
          EOF

          cat > plugins/firebase.client.ts <<'EOF'
          import { initializeApp, getApps } from 'firebase/app'
          import { getAuth } from 'firebase/auth'
          import { getFirestore } from 'firebase/firestore'
          import { getStorage } from 'firebase/storage'

          export default defineNuxtPlugin(() => {
            const config = useRuntimeConfig()

            const firebaseConfig = {
              apiKey: config.public.firebaseApiKey,
              authDomain: config.public.firebaseAuthDomain,
              projectId: config.public.firebaseProjectId,
              storageBucket: config.public.firebaseStorageBucket,
              messagingSenderId: config.public.firebaseMessagingSenderId,
              appId: config.public.firebaseAppId
            }

            const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig)
            const auth = getAuth(app)
            const db = getFirestore(app)
            const storage = getStorage(app)

            return {
              provide: {
                firebaseApp: app,
                auth,
                db,
                storage
              }
            }
          })
          EOF

