          import { onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from 'firebase/auth'
          import { doc, getDoc, serverTimestamp, setDoc } from 'firebase/firestore'

          type UserRole = 'user' | 'admin'

          interface AuthUser {
            uid: string
            name: string
            email: string
            role: UserRole
          }

          const authUserState = () => useState<AuthUser | null>('authUser', () => null)
          const authReadyState = () => useState<boolean>('authReady', () => false)
          const authInitState = () => useState<boolean>('authInitialized', () => false)

          export const useAuth = () => {
            const { $auth, $db } = useNuxtApp()
            const user = authUserState()
            const isReady = authReadyState()
            const isInitialized = authInitState()

            const initAuth = () => {
              if (!process.client || isInitialized.value) return

              isInitialized.value = true

              onAuthStateChanged($auth, async (firebaseUser) => {
                if (!firebaseUser) {
                  user.value = null
                  isReady.value = true
                  return
                }

                const userRef = doc($db, 'users', firebaseUser.uid)
                const userSnap = await getDoc(userRef)

                if (userSnap.exists()) {
                  const data = userSnap.data()
                  user.value = {
                    uid: firebaseUser.uid,
                    name: String(data.name || ''),
                    email: String(data.email || firebaseUser.email || ''),
                    role: (data.role as UserRole) || 'user'
                  }
                } else {
                  user.value = {
                    uid: firebaseUser.uid,
                    name: firebaseUser.displayName || '',
                    email: firebaseUser.email || '',
                    role: 'user'
                  }
                }

                isReady.value = true
              })
            }

            const register = async (payload: { name: string; email: string; password: string }) => {
              const credentials = await createUserWithEmailAndPassword($auth, payload.email, payload.password)

              await setDoc(doc($db, 'users', credentials.user.uid), {
                name: payload.name,
                email: payload.email,
                role: 'user',
                createdAt: serverTimestamp()
              })

              return credentials.user
            }

            const login = async (payload: { email: string; password: string }) => {
              const credentials = await signInWithEmailAndPassword($auth, payload.email, payload.password)
              return credentials.user
            }

            const logout = async () => {
              await signOut($auth)
              user.value = null
            }

            return {
              user,
              isReady,
              initAuth,
              register,
              login,
              logout
            }
          }
          EOF

          cat > composables/useCategories.ts <<'EOF'
          import {
            collection,
            addDoc,
            deleteDoc,
            doc,
            getDocs,
            orderBy,
            query,
            updateDoc
          } from 'firebase/firestore'

          export interface CategoryItem {
            id: string
            name: string
            description: string
          }

          const defaultCategories: CategoryItem[] = [
            { id: '1', name: 'Програмування', description: 'Навчальні матеріали з програмування' },
            { id: '2', name: 'Дизайн', description: 'Публікації з дизайну та графіки' },
            { id: '3', name: 'Освіта', description: 'Матеріали для навчання та саморозвитку' }
          ]

          const categoriesState = () => useState<CategoryItem[]>('categories', () => [])

          export const useCategories = () => {
            const { $db } = useNuxtApp()
            const categories = categoriesState()

            const loadCategories = async () => {
              try {
                const q = query(collection($db, 'categories'), orderBy('name'))
                const snapshot = await getDocs(q)

                categories.value = snapshot.docs.map(docItem => ({
                  id: docItem.id,
                  name: String(docItem.data().name || ''),
                  description: String(docItem.data().description || '')
                }))

                if (!categories.value.length) {
                  categories.value = defaultCategories
                }
              } catch {
                categories.value = defaultCategories
              }
            }

            const createCategory = async (payload: { name: string; description: string }) => {
              await addDoc(collection($db, 'categories'), payload)
              await loadCategories()
            }

            const updateCategory = async (id: string, payload: { name: string; description: string }) => {
              await updateDoc(doc($db, 'categories', id), payload)
              await loadCategories()
            }

            const removeCategory = async (id: string) => {
              await deleteDoc(doc($db, 'categories', id))
              await loadCategories()
            }

            return {
              categories,
              loadCategories,
              createCategory,
              updateCategory,
              removeCategory
            }
          }
          EOF

          cat > composables/usePublications.ts <<'EOF'
          import {
            addDoc,
            collection,
            deleteDoc,
            doc,
            getDoc,
            getDocs,
            orderBy,
            query,
            serverTimestamp,
            updateDoc
          } from 'firebase/firestore'

          export interface PublicationItem {
            id: string
            title: string
            author: string
            description: string
            content: string
            categoryId: string
            coverImage: string
            createdAt?: unknown
          }

          const demoPublications: PublicationItem[] = [
            {
              id: 'demo-1',
              title: 'Основи веб-розробки',
              author: 'Олена Коваль',
              description: 'Короткий вступ до сучасної веб-розробки та основ побудови інтерфейсів.',
              content: 'Це демонстраційний текст публікації. Надалі тут буде повний вміст книги або статті.',
              categoryId: '1',
              coverImage: ''
            },
            {
              id: 'demo-2',
              title: 'Tailwind CSS для початківців',
              author: 'Ірина Петренко',
              description: 'Практичний матеріал для створення адаптивних інтерфейсів за допомогою utility-first підходу.',
              content: 'Це демонстраційний текст другої публікації. Його можна буде замінити реальним контентом.',
              categoryId: '2',
              coverImage: ''
            }
          ]

          const publicationsState = () => useState<PublicationItem[]>('publications', () => [])
          const currentPublicationState = () => useState<PublicationItem | null>('currentPublication', () => null)

          export const usePublications = () => {
            const { $db } = useNuxtApp()
            const publications = publicationsState()
            const currentPublication = currentPublicationState()

            const loadPublications = async () => {
              try {
                const q = query(collection($db, 'publications'), orderBy('title'))
                const snapshot = await getDocs(q)

                publications.value = snapshot.docs.map(docItem => ({
                  id: docItem.id,
                  title: String(docItem.data().title || ''),
                  author: String(docItem.data().author || ''),
                  description: String(docItem.data().description || ''),
                  content: String(docItem.data().content || ''),
                  categoryId: String(docItem.data().categoryId || ''),
                  coverImage: String(docItem.data().coverImage || ''),
                  createdAt: docItem.data().createdAt
                }))

                if (!publications.value.length) {
                  publications.value = demoPublications
                }
              } catch {
                publications.value = demoPublications
              }
            }

            const loadPublicationById = async (id: string) => {
              try {
                const snapshot = await getDoc(doc($db, 'publications', id))

                if (snapshot.exists()) {
                  currentPublication.value = {
                    id: snapshot.id,
                    title: String(snapshot.data().title || ''),
                    author: String(snapshot.data().author || ''),
                    description: String(snapshot.data().description || ''),
                    content: String(snapshot.data().content || ''),
                    categoryId: String(snapshot.data().categoryId || ''),
                    coverImage: String(snapshot.data().coverImage || ''),
                    createdAt: snapshot.data().createdAt
                  }
                  return
                }

                currentPublication.value = publications.value.find(item => item.id === id) || null
              } catch {
                currentPublication.value = publications.value.find(item => item.id === id) || null
              }
            }

            const createPublication = async (payload: Omit<PublicationItem, 'id'>) => {
              await addDoc(collection($db, 'publications'), {
                ...payload,
                createdAt: serverTimestamp()
              })
              await loadPublications()
            }

            const updatePublication = async (id: string, payload: Omit<PublicationItem, 'id'>) => {
              await updateDoc(doc($db, 'publications', id), payload)
              await loadPublications()
            }

            const removePublication = async (id: string) => {
              await deleteDoc(doc($db, 'publications', id))
              await loadPublications()
            }

            return {
              publications,
              currentPublication,
              loadPublications,
              loadPublicationById,
              createPublication,
              updatePublication,
              removePublication
            }
          }
          EOF

          cat > middleware/auth.ts <<'EOF'
          export default defineNuxtRouteMiddleware(async () => {
            const { user, isReady, initAuth } = useAuth()

            if (process.client) {
              initAuth()

              if (!isReady.value) {
                await new Promise<void>((resolve) => {
                  const stop = watch(isReady, (value) => {
                    if (value) {
                      stop()
                      resolve()
                    }
                  })
                })
              }
            }

            if (!user.value) {
              return navigateTo('/login')
            }
          })
          EOF

          cat > middleware/admin.ts <<'EOF'
          export default defineNuxtRouteMiddleware(async () => {
            const { user, isReady, initAuth } = useAuth()

            if (process.client) {
              initAuth()

              if (!isReady.value) {
                await new Promise<void>((resolve) => {
                  const stop = watch(isReady, (value) => {
                    if (value) {
                      stop()
                      resolve()
                    }
                  })
                })
              }
            }

            if (!user.value) {
              return navigateTo('/login')
            }

            if (user.value.role !== 'admin') {
              return navigateTo('/')
            }
          })
          EOF

